---
- name: Install davfs2
  ansible.builtin.package:
    name: davfs2
    state: present
  become: true

- name: Adding osuser to davfs2 group to let him mount it itself
  ansible.builtin.user:
    name: "{{ nextcloud_davfs_osuser }}"
    groups: davfs2
    append: true
  become: true

- name: Configure secrets
  ansible.builtin.lineinfile:
    path: /etc/davfs2/secrets
    regexp: "^{{ nextcloud_davfs_cloud_url }}"
    line: "{{ nextcloud_davfs_cloud_url }} {{ nextcloud_davfs_cloud_user }} {{ nextcloud_davfs_cloud_password }}"
  no_log: true
  become: true

- name: Configure dav2fs option buf_size
  ansible.builtin.lineinfile:
    path: /etc/davfs2/davfs2.conf
    regexp: "buf_size"
    line: "buf_size        64"
  become: true

- name: Configure dav2fs option use_locks
  ansible.builtin.lineinfile:
    path: /etc/davfs2/davfs2.conf
    regexp: "use_locks"
    line: "use_locks        0"
  become: true

- name: Configure dav2fs option cache_size
  ansible.builtin.lineinfile:
    path: /etc/davfs2/davfs2.conf
    regexp: "cache_size"
    line: "cache_size        {{ nextcloud_davfs_cache_size }}"
  become: true

- name: Configure dav2fs option table_size
  ansible.builtin.lineinfile:
    path: /etc/davfs2/davfs2.conf
    regexp: "table_size"
    line: "table_size        32768"
  become: true

- name: "Ensure Nextcloud directory in /home/{{ nextcloud_davfs_osuser }}"
  ansible.builtin.file:
    path: "/home/{{ nextcloud_davfs_osuser }}/{{ nextcloud_davfs_osdir }}"
    state: directory
    owner: "{{ nextcloud_davfs_osuser }}"
    group: "{{ nextcloud_davfs_osgroup }}"
    mode: "0700"
  become: true

- name: "Configure Nextcloud mount in /home/{{ nextcloud_davfs_osuser }}"
  ansible.posix.mount:
    path: "/home/{{ nextcloud_davfs_osuser }}/{{ nextcloud_davfs_osdir }}"
    src: "{{ nextcloud_davfs_cloud_url }}"
    fstype: davfs
    opts: "user,auto,uid={{ nextcloud_davfs_osuser }},gid={{ nextcloud_davfs_osgroup }},file_mode=600,dir_mode=700,_netdev"
    state: mounted
  become: true

- name: "Ensure Nextcloud .nextrsync directory in /home/{{ nextcloud_davfs_osuser }}"
  ansible.builtin.file:
    path: "/home/{{ nextcloud_davfs_osuser }}/.nextrsync"
    state: directory
    owner: "{{ nextcloud_davfs_osuser }}"
    group: "{{ nextcloud_davfs_osgroup }}"
    mode: "0700"
  when: nextcloud_davfs_nextrsync | bool
  become: true

- name: "Configure .nextrsync mount in /home/{{ nextcloud_davfs_osuser }}"
  ansible.posix.mount:
    path: "/home/{{ nextcloud_davfs_osuser }}/.nextrsync"
    src: tmpfs
    fstype: tmpfs
    opts: "size=50m,nosuid,mode=0700,gid=root,uid={{ nextcloud_davfs_osuser }}"
    state: mounted
  when: nextcloud_davfs_nextrsync | bool and nextcloud_davfs_nextrsync_tmpfs | bool
  become: true

- name: Install rsync for nextrsync
  ansible.builtin.package:
    name: rsync
    state: present
  when: nextcloud_davfs_nextrsync | bool
  become: true

- name: Remove legacy nextrsync cron jobs
  ansible.builtin.cron:
    name: "{{ item }}"
    user: "{{ nextcloud_davfs_osuser }}"
    state: absent
  loop:
    - "Nextrsync for {{ nextcloud_davfs_osuser }}"
    - "Nextrsync for {{ nextcloud_davfs_osuser }} at boot"
  when: nextcloud_davfs_nextrsync | bool
  become: true

- name: Get systemd mount unit name for nextrsync dependency
  ansible.builtin.command:
    argv:
      - systemd-escape
      - -p
      - --suffix=mount
      - /home/{{ nextcloud_davfs_osuser }}/{{ nextcloud_davfs_osdir }}
  register: _nextcloud_davfs_mount_unit
  changed_when: false
  when: nextcloud_davfs_nextrsync | bool

- name: Deploy nextrsync script to /usr/local/bin
  ansible.builtin.template:
    src: nextrsync.sh.j2
    dest: /usr/local/bin/nextrsync
    owner: root
    group: root
    mode: "0755"
  when: nextcloud_davfs_nextrsync | bool
  become: true

- name: Deploy nextrsync systemd service unit
  ansible.builtin.template:
    src: nextrsync.service.j2
    dest: "/etc/systemd/system/nextrsync_{{ nextcloud_davfs_osuser }}.service"
    owner: root
    group: root
    mode: "0644"
  when: nextcloud_davfs_nextrsync | bool
  become: true

- name: Deploy nextrsync systemd timer unit
  ansible.builtin.template:
    src: nextrsync.timer.j2
    dest: "/etc/systemd/system/nextrsync_{{ nextcloud_davfs_osuser }}.timer"
    owner: root
    group: root
    mode: "0644"
  when: nextcloud_davfs_nextrsync | bool
  become: true

- name: Enable and start nextrsync timer
  ansible.builtin.systemd:
    name: "nextrsync-{{ nextcloud_davfs_osuser }}.timer"
    enabled: true
    state: started
    daemon_reload: true
  when: nextcloud_davfs_nextrsync | bool
  become: true
